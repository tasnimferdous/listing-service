server:
  port: 8085

spring:
  application:
    name: listing-service

  #  ------- db config -------
  datasource:
    url: jdbc:mysql://localhost:3306/listing-service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        use_sql_comments: true

